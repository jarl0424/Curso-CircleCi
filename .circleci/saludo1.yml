version: 2.1

jobs:
  saludo:
    docker:
      - image: cimg/base:stable
    steps:
      - run : echo "Hola, este es un saludo desde CircleCI"

  despidete:
    docker:
      - image: cimg/base:stable
    steps:
      - run : echo "chao 1"
      - run : echo "chao 2"
      - run : echo "chao 3"


workflows:
  workflows1:
    jobs:
      - saludo
      - despidete
  workflows2:
    jobs:
      - saludo
      - despidete:
          requires:
            - saludo
  workflows3:
    jobs:
      - saludo
      - approval:
          type: approval
          requires:
            - saludo
      - despidete:
          requires:
            - approval

  workflows4:
    jobs:
      - saludo
      - despidete
  